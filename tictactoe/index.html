<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.2rem;
      min-height: 1.8rem;
      color: #a0a0c0;
    }

    #status.win { color: #4ecca3; font-weight: bold; }
    #status.draw { color: #f5a623; font-weight: bold; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #4ecca3; }
    .cell.winning { background: #0f3460; box-shadow: 0 0 18px rgba(78,204,163,0.4); }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-top: 1.8rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      min-width: 80px;
    }

    .score-box span { display: block; }
    .score-box .label { color: #a0a0c0; font-size: 0.8rem; margin-bottom: 2px; }
    .score-box .val { font-size: 1.6rem; font-weight: bold; }
    .score-box.x .val { color: #e94560; }
    .score-box.o .val { color: #4ecca3; }
    .score-box.draw .val { color: #f5a623; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.65rem 2rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #mode {
      margin-bottom: 1.2rem;
      display: flex;
      gap: 0.8rem;
    }

    .mode-btn {
      padding: 0.4rem 1.1rem;
      border-radius: 20px;
      border: 2px solid #0f3460;
      background: transparent;
      color: #a0a0c0;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    .mode-btn.active { background: #0f3460; color: #fff; border-color: #4ecca3; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>

<div id="mode">
  <button class="mode-btn active" onclick="setMode('pvp')">2 Players</button>
  <button class="mode-btn" onclick="setMode('cpu')">vs CPU</button>
</div>

<div id="status">X's turn</div>

<div id="board">
  <div class="cell" onclick="play(0)"></div>
  <div class="cell" onclick="play(1)"></div>
  <div class="cell" onclick="play(2)"></div>
  <div class="cell" onclick="play(3)"></div>
  <div class="cell" onclick="play(4)"></div>
  <div class="cell" onclick="play(5)"></div>
  <div class="cell" onclick="play(6)"></div>
  <div class="cell" onclick="play(7)"></div>
  <div class="cell" onclick="play(8)"></div>
</div>

<div id="score">
  <div class="score-box x"><span class="label">X</span><span class="val" id="sx">0</span></div>
  <div class="score-box draw"><span class="label">DRAW</span><span class="val" id="sd">0</span></div>
  <div class="score-box o"><span class="label">O</span><span class="val" id="so">0</span></div>
</div>

<button id="reset" onclick="resetGame()">New Game</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, current, gameOver, mode, score;

  function init() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    score = score || { X: 0, O: 0, D: 0 };
    mode = mode || 'pvp';
    render();
    setStatus(`X's turn`);
    document.getElementById('status').className = '';
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    resetGame();
  }

  function play(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    render();
    const result = checkResult();
    if (result) { endGame(result); return; }
    current = current === 'X' ? 'O' : 'X';
    setStatus(`${current}'s turn`);
    if (mode === 'cpu' && current === 'O') {
      setTimeout(cpuMove, 350);
    }
  }

  function cpuMove() {
    if (gameOver) return;
    const move = bestMove();
    if (move !== -1) play(move);
  }

  function bestMove() {
    // Try to win
    for (let i = 0; i < 9; i++) {
      if (!board[i]) { board[i] = 'O'; if (winner()) { board[i] = null; return i; } board[i] = null; }
    }
    // Block X from winning
    for (let i = 0; i < 9; i++) {
      if (!board[i]) { board[i] = 'X'; if (winner()) { board[i] = null; return i; } board[i] = null; }
    }
    // Take center
    if (!board[4]) return 4;
    // Take a corner
    const corners = [0, 2, 6, 8].filter(i => !board[i]);
    if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    // Take any open
    const open = board.map((v, i) => v ? null : i).filter(i => i !== null);
    return open.length ? open[Math.floor(Math.random() * open.length)] : -1;
  }

  function winner() {
    return WINS.find(([a, b, c]) => board[a] && board[a] === board[b] && board[a] === board[c]);
  }

  function checkResult() {
    const w = winner();
    if (w) return { type: 'win', line: w, player: board[w[0]] };
    if (board.every(v => v)) return { type: 'draw' };
    return null;
  }

  function endGame(result) {
    gameOver = true;
    if (result.type === 'win') {
      result.line.forEach(i => document.querySelectorAll('.cell')[i].classList.add('winning'));
      setStatus(`${result.player} wins!`);
      document.getElementById('status').className = 'win';
      score[result.player]++;
    } else {
      setStatus("It's a draw!");
      document.getElementById('status').className = 'draw';
      score.D++;
    }
    updateScore();
  }

  function render() {
    const cells = document.querySelectorAll('.cell');
    board.forEach((val, i) => {
      cells[i].textContent = val || '';
      cells[i].className = 'cell' + (val ? ` taken ${val.toLowerCase()}` : '');
    });
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  function updateScore() {
    document.getElementById('sx').textContent = score.X;
    document.getElementById('so').textContent = score.O;
    document.getElementById('sd').textContent = score.D;
  }

  function resetGame() { init(); }

  init();
</script>
</body>
</html>
